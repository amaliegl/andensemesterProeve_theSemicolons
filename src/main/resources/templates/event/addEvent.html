<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="description" content="Deckforge hjemmeside">
    <meta name="keywords" content="HTML, CSS, Deckforge, MTG, TCG, Magic The Gathering, cards, kort">
    <meta name="author" content="Amalie Gravgaard Lange & Sara Holmberg Juul">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>addEvent</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="background-image auth-background">
<div class="wrapper">
    <header>
        <!-- header indhold -->
        <div th:insert="~{parts/navigation:: nav}"></div>
    </header>
    <main>
        <div class="container">
            <h2>Tilføj event</h2>
            <form method="post" th:action="@{/addEvent}" th:object="${event}">

                <label>Navn:</label>
                <input class="inputBox" type="text" id="name" th:field="*{name}" required>
                <label class="inputLabel">Event type:
                    <select th:field="*{type}" class="inputBox">
                        <option th:each="type : ${T(org.example.andensemesterproeve_thesemicolons.domain.enums.EventType_ENUM).values()}"
                                th:value="${type.name()}"
                                th:text="${type}">
                        </option>
                    </select>
                </label>


                <label>Format(Valgfrit):
                    <input class="inputBox" type="text" id="format" th:field="*{format}">
                </label>

                <label>Max antal spillere:</label>
                <input class="inputBox" type="number" id="maxPlayers" th:field="*{maxPlayers}" min="1" step="1"
                       required>

                <label>Dato:</label>
                <input class="inputBox" type="date" id="date" th:field="*{date}" required>

                <label>Tidspunkt:</label>
                <input class="inputBox" type="time" id="time" th:field="*{time}" required>

                <br><br>
                <button class="submitButton" type="submit">Opret event</button>
            </form>

        </div>
    </main>
    <div th:insert="~{parts/footer:: footer}"></div>
</div>
</body>

</html>
