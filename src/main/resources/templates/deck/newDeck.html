<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="description" content="Deckforge hjemmeside">
    <meta name="keywords" content="HTML, CSS, Deckforge, MTG, TCG, Magic The Gathering, cards, kort">
    <meta name="author" content="Amalie Gravgaard Lange & Sara Holmberg Juul">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="background-image auth-background">
<div class="wrapper">
    <header>
        <!-- header indhold -->
        <div th:insert="~{parts/navigation:: nav}"></div>
    </header>
    <main>
        <div class="container">
            <h2>Opret nyt deck</h2>

            <form th:action="@{/myDecks/addDeck}" method="post" th:object="${deck}" class="card-specific-info">
                <div>
                    <label>Deck-navn:
                        <input type="text" th:field="${deck.name}" class="inputBox">
                    </label>
                </div>
                <div>
                    <label>Deck-format:
                        <input type="text" th:field="${deck.format}" class="inputBox">
                    </label>
                </div>
                <button type="submit" class="submitButton">Opret deck</button>
            </form>
        </div>
        <button class="changePageButton" type="button" th:onclick="|window.location.href='@{/myDecks}'|">
            Tilbage til mine decks (annullér oprettelse)</button>

    </main>
    <div th:insert="~{parts/footer:: footer}"></div>
</div>
</body>

</html>
