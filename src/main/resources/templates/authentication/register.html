<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="Deckforge hjemmeside">
    <meta name="keywords" content="HTML, CSS, Deckforge, MTG, TCG, Magic The Gathering, cards, kort">
    <meta name="author" content="Amalie Gravgaard Lange & Sara Holmberg Juul">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrering</title>
    <link rel="stylesheet" href="css/style.css">
    <script type="text/javascript" src="script.js" defer></script>
</head>
<body>
<div class="container">
    <h2>Opret bruger</h2>
    <form method="post" onsubmit="return validateTermsAndConditionsCheckbox(event)" th:action="@{/register}"
          th:object="${user}">
        <label class="inputLabel" for="username">Brugernavn:</label>
        <input type="email" id="username" th:field="*{username}" placeholder="Brugernavn" required>
        <br>
        <label class="inputLabel" for="email">Email:</label>
        <input type="email" id="email" th:field="*{email}" placeholder="Email" required>
        <br>
        <label class="inputLabel" for="password">Password:</label>
        <input type="password" id="password" th:field="*{password}" placeholder="Password" required>
        <br>
        <label class="inputLabel" for="name">Gentag password:</label>
        <input type="text" id="name" required placeholder="Gentag password">
        <br>
        <br>

        <div class="termsandconditionsbox">
            <label>
                <input class="termsandconditions" type="checkbox" name="terms" style="margin-bottom:15px">  Jeg accepterer <a href="#" class="link" onclick="termsAndConditionsClick()">privatlivspolitikken</a>
            </label>
        </div>

        <div class="error" th:text="${error}"></div>
        <p id="errorMsg" class="error"></p>
        <button type="submit">Opret bruger</button>
    </form>
    <div>
        <button onclick="window.location.href='authentication/login';" class="GFG">Til login</button>
    </div>
</div>
<div th:insert="~{parts/footer:: footer}"></div>
</body>
</html>
