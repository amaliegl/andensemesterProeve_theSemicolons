<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="description" content="Deckforge hjemmeside">
    <meta name="keywords" content="HTML, CSS, Deckforge, MTG, TCG, Magic The Gathering, cards, kort">
    <meta name="author" content="Amalie Gravgaard Lange & Sara Holmberg Juul">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mine kort</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="background-image auth-background">
<div class="wrapper">
    <header>
        <!-- header indhold -->
        <div th:insert="~{parts/navigation:: nav}"></div>
    </header>
    <main>
        <div class="container">
            <h2>Mine kort</h2>
        </div>

        <form method="get" action="/myCards">
        <label for="selectedSetSort">Sortér på sæt:
            <select name="selectedSetSort" id="selectedSetSort" onchange="this.form.submit()" class="inputBox">
                <option th:selected="${selectedSetSort}">Intet filter</option>
                <option th:each="set : ${sets}" th:value="${set}" th:text="${set}" th:selected="${selectedSetSort == set}"></option>
                <!-- th:onclick="@{/myCards/set/{set}(set=${set})} !-->
            </select>
        </label>

        <label>Sortér på type:
            <select class="inputBox">
                <option>Intet filter</option>
                <option th:each="type : ${types}" th:value="${type}" th:text="${type}"></option>
            </select>
        </label>


        <section class="card-container">
            <div class="card" th:each="card : ${cards}">
                <img th:src="${card.imageUrl}" th:alt="|Billede af ${card.name}|">
                <div class="card-content">
                    <h3 th:text="${card.name}"></h3>
                    <p th:text="${card.set}"></p>
                    <p th:text="${card.rarity}"></p>
                    <a href="" class="btn">Se detaljer</a>
                </div>
            </div>
        </section>
        </form>

    </main>
    <div th:insert="~{parts/footer:: footer}"></div>
</div>
</body>

</html>
